<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#6366f1"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="CS Timer"/>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="css/app.css"/>
  <script>
    (function(){
      var t = localStorage.getItem('cstn_theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
      var bg = t === 'dark' ? '#0a0c12' : '#f4f6fb';
      document.documentElement.style.backgroundColor = bg;
      document.addEventListener('DOMContentLoaded', function(){ document.body.style.backgroundColor = bg; });
    })();
  </script>
  <title>CloudSync Timer Notes</title>
</head>
<body>

<!-- 載入遮罩 -->
<div id="loading-overlay" class="loading-overlay">
  <div class="spinner" style="width:36px;height:36px;border-width:3px;"></div>
  <div style="font-size:13px;color:var(--text-muted);margin-top:12px;">初始化中…</div>
</div>

<!-- 更新橫幅 -->

<!-- ══ 登入畫面 (V5_0 Redesign) ══ -->
<div id="login-screen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="icons/icon-192.png" alt="Logo"/>
    </div>
    <h1 class="login-title">CloudSync Timer Notes</h1>
    <p class="login-subtitle">結合記事、倒數計時與行事曆<br/>所有資料安全儲存於 Google Drive</p>
    <button class="btn-google" id="btn-google-login">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/>
      使用 Google 帳號登入
    </button>
    <div id="ios-install-banner" style="display:none;margin-top:20px;">
      <div style="background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);border-radius:12px;padding:14px;text-align:center;">
        <div style="font-size:18px;margin-bottom:6px;">📱</div>
        <div style="font-size:12px;color:var(--text-secondary);line-height:1.6;">
          iOS 用戶請先點底部<strong style="color:var(--text-primary);">「分享→加入主畫面」</strong>才能啟用推播提醒
        </div>
      </div>
    </div>
    <div class="login-version" id="login-version">V5_0</div>
  </div>
</div>

<!-- ══ 主應用程式 ══ -->
<div id="app" style="display:none;">

  <!-- 頂部導覽列 -->
  <header class="topbar">
    <div class="topbar-row topbar-row-main">
      <a class="topbar-brand" href="#" onclick="return false;">
        <span class="brand-icon"><img src="icons/icon-192.png" alt=""/></span>
        <span id="topbar-title">行事曆</span>
      </a>
      <div class="topbar-actions">
        <button class="topbar-action-btn" id="btn-theme-toggle" onclick="toggleTheme()" title="切換主題">🌙</button>
        <button class="topbar-action-btn" id="btn-search" onclick="toggleSearch()" style="visibility:hidden;" title="搜尋">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <button class="btn btn-primary topbar-add-btn" id="btn-add-note" onclick="openNoteModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px;"><path d="M12 5v14M5 12h14"/></svg>
          新增
        </button>
      </div>
    </div>
    <div class="topbar-row topbar-row-sub">
      <div class="topbar-sub-left">
        <div class="sync-chip" id="sync-chip">
          <span class="sync-dot" id="sync-dot"></span>
          <span id="sync-text">就緒</span>
        </div>
        <div id="share-mode-badge" style="display:none;">🔗 共用</div>
      </div>
      <div class="topbar-sync-group">
        <button class="topbar-sync-btn" id="btn-refresh" onclick="refreshFromDrive()">↻ 重新整理</button>
        <button class="topbar-sync-btn topbar-upload-btn" id="btn-upload" onclick="uploadToDrive()" disabled>↑ 立即同步</button>
      </div>
    </div>
  </header>

  <!-- 通知橫幅 -->
  <div id="notification-banner" class="notification-banner hidden">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;flex-shrink:0;"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <span style="flex:1;font-size:13px;">啟用通知以接收到期提醒</span>
    <button class="btn btn-primary" style="padding:5px 12px;font-size:12px;" onclick="requestNotificationPermission()">啟用</button>
    <button class="topbar-action-btn" style="width:28px;height:28px;" onclick="document.getElementById('notification-banner').classList.add('hidden')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <!-- 搜尋列 -->
  <div id="search-bar" style="display:none;padding:10px 16px;border-bottom:1px solid var(--border-subtle);background:var(--bg-surface);">
    <input type="text" class="form-input" placeholder="搜尋記事標題或內容…" id="search-input" oninput="handleSearch(this.value)"/>
  </div>

  <!-- 桌面側欄 -->
  <aside class="sidebar">
    <div style="padding:0 4px 12px;border-bottom:1px solid var(--border-subtle);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);">版本</div>
        <div id="app-version" style="font-size:12px;color:var(--accent-hover);font-family:var(--font-mono);">V5_0</div>
      </div>
      <button class="topbar-action-btn" id="btn-theme-toggle-sidebar" onclick="toggleTheme()" style="font-size:16px;">🌙</button>
    </div>
    <div class="sidebar-divider" style="margin:0 0 8px;"></div>
    <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);padding:0 4px 6px;">主選單</div>
    <button class="sidebar-item" data-view="notes" onclick="switchView('notes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      所有記事
    </button>
    <button class="sidebar-item active" data-view="calendar" onclick="switchView('calendar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      行事曆
    </button>
    <button class="sidebar-item" data-view="timers" onclick="switchView('timers')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      倒數計時
    </button>
    <button class="sidebar-item" data-view="settings" onclick="switchView('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      設定
    </button>
    <div class="sidebar-divider"></div>
    <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);padding:0 4px 6px;">分類</div>
    <div id="sidebar-categories"></div>
    <button class="sidebar-item" style="color:var(--text-muted);" onclick="openCategoryModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      新增分類
    </button>
    <div style="margin-top:auto;padding-top:12px;border-top:1px solid var(--border-subtle);">
      <div style="display:flex;align-items:center;gap:8px;padding:8px 4px;cursor:pointer;" onclick="toggleUserMenu()">
        <img id="user-avatar" src="" alt="" style="width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid var(--border-subtle);"/>
        <div style="flex:1;min-width:0;">
          <div id="user-name" style="font-size:12px;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">載入中…</div>
          <div id="user-email" style="font-size:10px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
        </div>
        <span style="color:var(--text-muted);font-size:12px;">⋮</span>
      </div>
      <div id="user-menu" style="display:none;">
        <button class="sidebar-item" onclick="requestNotificationPermission()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          通知設定
        </button>
        <button class="sidebar-item" onclick="handleLogout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          登出
        </button>
      </div>
    </div>
  </aside>

  <!-- 主內容區 -->
  <main class="main-content">

    <!-- View 1：記事 -->
    <div id="view-notes" class="view-container view-scroll" style="display:none;">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;justify-content:space-between;">
        <div style="display:flex;gap:4px;flex-wrap:wrap;">
          <button class="btn filter-btn active" data-filter="all" onclick="filterNotes('all',this)">全部</button>
          <button class="btn filter-btn" data-filter="upcoming" onclick="filterNotes('upcoming',this)">7天內到期</button>
          <button class="btn filter-btn" data-filter="overdue" onclick="filterNotes('overdue',this)">已逾期</button>
        </div>
        <div style="display:flex;gap:4px;">
          <button class="btn btn-secondary btn-sm" id="btn-sort-order" onclick="toggleSortOrder()" style="font-size:11px;white-space:nowrap;">依時間 新→舊</button>
          <button class="btn btn-secondary btn-sm" id="btn-batch-delete-enter" onclick="enterBatchDeleteMode()" style="font-size:11px;">🗑 批次</button>
        </div>
      </div>
      <div id="batch-delete-bar" style="display:none;align-items:center;gap:10px;padding:10px 14px;background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.25);border-radius:10px;margin-bottom:10px;">
        <span id="batch-delete-count" style="font-size:13px;color:var(--danger);font-weight:600;">已選 0 筆</span>
        <div style="margin-left:auto;display:flex;gap:8px;">
          <button class="btn btn-ghost btn-sm" onclick="exitBatchDeleteMode()">取消</button>
          <button class="btn btn-danger btn-sm" onclick="confirmBatchDelete()">刪除所選</button>
        </div>
      </div>
      <div id="schedule-summary" style="display:none;"></div>
      <div class="notes-table-wrapper">
        <table class="notes-table">
          <thead>
            <tr>
              <th id="batch-col" style="display:none;width:36px;"></th>
              <th>記事標題</th>
              <th>提醒</th>
              <th>週期</th>
              <th>起始時間</th>
              <th>結束時間</th>
              <th>狀態</th>
            </tr>
          </thead>
          <tbody id="notes-tbody"></tbody>
        </table>
        <div id="notes-empty" class="empty-state" style="display:none;">
          <div class="empty-state-icon">📝</div>
          <div class="empty-state-title">沒有符合的記事</div>
          <div class="empty-state-desc">點擊下方「＋」建立記事</div>
        </div>
      </div>
      <div id="calendar-integration" style="display:none;"></div>
    </div>

    <!-- View 2：行事曆 -->
    <div id="view-calendar" class="view-container">
      <div class="calendar-controls">
        <div class="calendar-nav">
          <button class="calendar-nav-btn" onclick="calendarPrev()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <span class="calendar-month-label" id="calendar-title">載入中…</span>
          <button class="calendar-nav-btn" onclick="calendarNext()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <button class="btn btn-secondary btn-sm" onclick="calendarGoToday()">今天</button>
        </div>
        <div class="calendar-view-toggle">
          <button class="view-toggle-btn active" id="btn-month-view" onclick="switchCalendarView('month')">月</button>
          <button class="view-toggle-btn" id="btn-week-view" onclick="switchCalendarView('week')">週</button>
        </div>
      </div>
      <div id="calendar-month-view">
        <div class="calendar-grid-month" id="calendar-weekdays"></div>
        <div class="calendar-grid-month" id="calendar-days" style="margin-top:2px;"></div>
      </div>
      <div id="calendar-week-view" style="display:none;">
        <div id="week-grid-container"></div>
      </div>
      <div id="day-events-panel" style="display:none;">
        <div class="day-events-panel-inner">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-shrink:0;">
            <span style="font-size:14px;font-weight:600;color:var(--text-primary);" id="day-events-title"></span>
            <button class="topbar-action-btn" style="width:28px;height:28px;" onclick="document.getElementById('day-events-panel').style.display='none'">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
          </div>
          <div id="day-events-list" class="day-events-scroll"></div>
        </div>
      </div>
    </div>

    <!-- View 3：倒數計時 -->
    <div id="view-timers" class="view-container" style="display:none;">
      <p style="color:var(--text-secondary);font-size:13px;margin:0 0 14px;">所有設定到期日的記事，依時間排序</p>
      <div id="timers-list"></div>
    </div>

    <!-- View 4：設定 -->
    <div id="view-settings" class="view-container view-scroll" style="display:none;">
      <div id="settings-content"></div>
    </div>

  </main>

  <!-- 手機底部導覽 -->
  <nav class="bottom-nav">
    <button class="bottom-nav-item" data-view="notes" onclick="switchView('notes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      記事
    </button>
    <button class="bottom-nav-item" data-view="calendar" onclick="switchView('calendar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      行事曆
    </button>
    <button class="bottom-nav-item bottom-nav-add" onclick="openNoteModal()">
      <div class="bottom-nav-add-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" style="width:22px;height:22px;"><path d="M12 5v14M5 12h14"/></svg>
      </div>
    </button>
    <button class="bottom-nav-item" data-view="timers" onclick="switchView('timers')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      計時
    </button>
    <button class="bottom-nav-item" data-view="settings" onclick="switchView('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      設定
    </button>
  </nav>

</div>

<!-- ══ Modal：新增/編輯記事 ══ -->
<div id="note-modal" class="modal-overlay" onclick="closeModalOnOverlay(event,'note-modal')">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="note-modal-title">新增記事</span>
      <button class="topbar-action-btn" onclick="closeModal('note-modal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">標題</label>
        <input type="text" class="form-input" id="note-title" placeholder="輸入記事標題（選填，未填自動產生）"/>
      </div>
      <div class="form-group">
        <label class="form-label">內容</label>
        <textarea class="form-textarea" id="note-content" placeholder="輸入記事內容…"></textarea>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">分類</label>
          <select class="form-select" id="note-category"><option value="">無分類</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">週期</label>
          <select class="form-select" id="note-repeat" onchange="updateRepeatSummary()">
            <option value="none">不重複</option>
            <option value="daily">每天</option>
            <option value="weekly">每週</option>
            <option value="monthly">每月</option>
            <option value="yearly">每年</option>
          </select>
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">到期日期</label>
          <input type="date" class="form-input" id="note-due-date" onchange="updateRepeatSummary()"/>
        </div>
        <div class="form-group">
          <label class="form-label">到期時間（選填）</label>
          <input type="time" class="form-input" id="note-due-time" onchange="updateRepeatSummary()"/>
        </div>
      </div>
      <div class="grid-2" id="repeat-end-row" style="display:none;">
        <div class="form-group">
          <label class="form-label">重複結束日</label>
          <input type="date" class="form-input" id="note-repeat-end" onchange="updateRepeatSummary()"/>
        </div>
        <div></div>
      </div>
      <div id="repeat-summary" style="display:none;"></div>
      <div class="form-group">
        <label class="form-label">🔔 提醒時機</label>
        <select class="form-select" id="note-remind-offset">
          <option value="-1">不提醒</option>
          <option value="0">到期當下</option>
          <option value="5">提前 5 分鐘</option>
          <option value="10">提前 10 分鐘</option>
          <option value="15" selected>提前 15 分鐘</option>
          <option value="30">提前 30 分鐘</option>
          <option value="60">提前 1 小時</option>
          <option value="1440">提前 1 天</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">附件</label>
        <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()" ondragover="handleDragOver(event)" ondrop="handleDrop(event)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:24px;height:24px;margin-bottom:4px;opacity:.4;"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          <div style="font-size:12px;color:var(--text-muted);">點擊或拖曳檔案</div>
        </div>
        <input type="file" id="file-input" style="display:none;" multiple onchange="handleFileSelect(event)"/>
        <div id="attachment-list" style="margin-top:6px;"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('note-modal')">取消</button>
      <button class="btn btn-danger" id="btn-delete-note" style="display:none;" onclick="deleteCurrentNote()">刪除</button>
      <button class="btn btn-primary" onclick="saveNote()"><span id="save-btn-text">儲存</span></button>
    </div>
  </div>
</div>

<!-- ══ Modal：分類管理 ══ -->
<div id="category-modal" class="modal-overlay" onclick="closeModalOnOverlay(event,'category-modal')">
  <div class="modal" style="max-width:420px;">
    <div class="modal-header">
      <span class="modal-title">管理分類</span>
      <button class="topbar-action-btn" onclick="closeModal('category-modal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="category-list" style="margin-bottom:20px;"></div>
      <div style="border-top:1px solid var(--border-subtle);padding-top:14px;">
        <div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:12px;">新增分類</div>
        <div class="form-group">
          <label class="form-label">分類名稱</label>
          <input type="text" class="form-input" id="new-category-name" placeholder="例：工作、生活、學習"/>
        </div>
        <div class="form-group">
          <label class="form-label">代表顏色</label>
          <div class="color-picker-row" id="color-picker"></div>
        </div>
        <button class="btn btn-primary w-full" onclick="addCategory()">新增分類</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ 備份記錄 Modal ══ -->
<div id="backup-modal" class="modal-overlay" onclick="closeModalOnOverlay(event,'backup-modal')">
  <div class="modal" style="max-width:540px;">
    <div class="modal-header">
      <span class="modal-title">💾 備份記錄</span>
      <button class="topbar-action-btn" onclick="closeModal('backup-modal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <p class="backup-modal-subtitle">點擊任一備份記錄可還原資料。還原後目前資料將被覆蓋。</p>
      <div style="display:flex;gap:8px;margin-bottom:14px;">
        <button class="btn btn-primary" onclick="doManualBackup()" style="flex:1;">📥 立即備份</button>
        <button class="btn btn-secondary" onclick="loadAndShowBackups()" style="flex:1;">🔄 重新整理</button>
      </div>
      <div id="backup-modal-list">
        <div style="color:var(--text-muted);font-size:13px;text-align:center;padding:24px;">點擊「查看備份記錄」載入</div>
      </div>
    </div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="js/auth.js"></script>
<script src="js/drive.js"></script>
<script src="js/notes.js"></script>
<script src="js/calendar.js"></script>
<script src="js/timer.js"></script>
<script src="js/notify.js"></script>
<script src="js/settings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
